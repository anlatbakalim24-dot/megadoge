<!DOCTYPE html>
<html lang="tr">
<head>
    <script src='//libtl.com/sdk.js' data-zone='10793774' data-sdk='show_10793774'></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaDoge Faucet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-button-color: #0088cc;
            --tg-theme-button-text-color: #ffffff;
            --tg-theme-hint-color: #999999;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            color: #333;
        }
        .container {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .faucet-name { color: var(--tg-theme-button-color); margin-bottom: 5px; font-size: 24px; font-weight: bold; }
        .crypto-badge {
            background: #fff9c4;
            color: #fbc02d;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
        }
        #claimBtn {
            background-color: var(--tg-theme-button-color);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        #claimBtn:disabled { background-color: #ccc; }
        .timer-box { margin-top: 15px; font-weight: bold; color: #e53935; display: none; }
        
        /* Başarı Ekranı */
        #successScreen { display: none; padding: 20px; }
        .check-icon { font-size: 50px; color: #4CAF50; }
    </style>
</head>
<body>

<div class="container">
    <div id="faucetForm">
        <div class="faucet-name">MegaDoge Faucet</div>
        <div class="crypto-badge">Ödeme Birimi: DOGE Coin</div>
        <div class="user-welcome">Merhaba, <span id="tgUser">Kullanıcı</span>! 👋</div>
        <p style="font-size: 14px; color: #666;">Her 1 dakikada bir ücretsiz DOGE kazanabilirsin.</p>
        
        <input type="email" id="userEmail" placeholder="FaucetPay Email Adresiniz">
        <button id="claimBtn" onclick="initiateClaim()">💰 Ödülü Topla</button>
        
        <div id="mainWaitTimer" class="timer-box">
            Yeni hak için bekle: <span id="timeLeft">60</span> saniye
        </div>
    </div>

    <div id="successScreen">
        <div class="check-icon">✅</div>
        <h2 style="color: #2e7d32;">ÖDEME TAMAM!</h2>
        <p>Satoshi'ler FaucetPay hesabınıza gönderildi.</p>
        <p style="font-size: 12px; color: #999;">Sayaç bitince tekrar alabilirsiniz.</p>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    
    document.getElementById('tgUser').innerText = tg.initDataUnsafe.user?.first_name || "Ziyaretçi";
    
    const savedEmail = localStorage.getItem('faucetEmail');
    if(savedEmail) document.getElementById('userEmail').value = savedEmail;

    const WORKER_URL = "https://young-cell-f414.anlatbakalim24.workers.dev/";

    function initiateClaim() {
        const email = document.getElementById('userEmail').value;
        if (!email.includes("@")) {
            alert("Lütfen geçerli bir FaucetPay email adresi girin.");
            return;
        }
        localStorage.setItem('faucetEmail', email);

        // Monetag Reklamını Başlat
        show_10793774('pop').then(() => {
            completeClaim(); 
        }).catch(e => {
            completeClaim(); // Reklam hatası olsa bile ödemeye gönder (kullanıcı kaçmasın)
        });
    }

    async function completeClaim() {
        // Formu gizle, başarıyı göster
        document.getElementById('faucetForm').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';

        const email = localStorage.getItem('faucetEmail');

        try {
            await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
        } catch (error) {
            console.log("Bağlantı hatası");
        }

        startMainTimer(60);
    }

    function startMainTimer(seconds) {
        const timeLeftSpan = document.getElementById('timeLeft');
        const timerDisplay = document.getElementById('mainWaitTimer');
        let remaining = seconds;

        const claimInterval = setInterval(() => {
            remaining--;
            timeLeftSpan.innerText = remaining;
            
            if (remaining <= 0) {
                clearInterval(claimInterval);
                // Başarı ekranını gizle, formu geri getir
                document.getElementById('successScreen').style.display = 'none';
                document.getElementById('faucetForm').style.display = 'block';
                timerDisplay.style.display = 'none';
                document.getElementById('claimBtn').disabled = false;
            } else {
                // Sadece form görünürken sayacı göster
                timerDisplay.style.display = 'block';
            }
        }, 1000);
    }

    // Otomatik reklam ayarı
    show_10793774({
        type: 'inApp',
        inAppSettings: {
            frequency: 2,
            capping: 0.1,
            interval: 30,
            timeout: 5,
            everyPage: false
        }
    });
</script>
</body>
</html>
