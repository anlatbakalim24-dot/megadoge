<script>
    let tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const WORKER_URL = "https://young-cell-f414.anlatbakalim24.workers.dev/";
    
    // DAHA GÜÇLÜ KİMLİK DOĞRULAMA (CPM Artırıcı)
    const user = tg.initDataUnsafe?.user;
    // Kullanıcı ID'sini ve dilini birleştirerek 'gerçek insan' sinyali gönderiyoruz
    const userId = user?.id ? `TG_${user.id}_${user.language_code || 'en'}` : "GUEST_" + Math.random().toString(36).substring(7);

    // İlk açılışta kullanıcıyı karşıla
    window.onload = () => {
        const greet = document.getElementById('userGreeting');
        if(greet) greet.innerText = "Merhaba, " + (user?.first_name || "Doge Sever") + "! 👋";
    };

    function initiateClaim() {
        const email = document.getElementById('userEmail').value;
        if (!email.includes("@")) {
            alert("Lütfen geçerli bir FaucetPay e-postası girin.");
            return;
        }
        localStorage.setItem('faucetEmail', email);

        const claimBtn = document.getElementById('claimBtn');
        claimBtn.disabled = true;
        claimBtn.innerText = "🔄 Reklam Yükleniyor (15s)...";

        // MONETAG REWARDED ÇAĞRISI
        if (typeof show_10793774 === 'function') {
            show_10793774({ ymid: userId })
                .then(() => {
                    // KULLANICI X'E BASTI VE REKLAM BAŞARIYLA KAPANDI
                    console.log("Reklam Onaylandı: ", userId);
                    completeClaim();
                })
                .catch((e) => {
                    // Reklam izlenmedi veya hata oluştu
                    alert("Ödül kazanmak için reklamın bitmesini bekleyin ve X butonuyla kapatın.");
                    resetButton();
                });
        } else {
            alert("Reklam şu an hazır değil, lütfen sayfayı yenileyin.");
            resetButton();
        }
    }

    async function completeClaim() {
        // EKRANLARI DEĞİŞTİR
        document.getElementById('faucetForm').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
        document.getElementById('mainWaitTimer').style.display = 'block';

        const email = localStorage.getItem('faucetEmail');

        // WORKER SİNYALİ (Ödeme Tetikleyici)
        try {
            await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
        } catch (e) { console.log("Worker bağlantısı kuruldu."); }

        startMainTimer(60);
    }

    function startMainTimer(seconds) {
        let remaining = seconds;
        const display = document.getElementById('timeLeft');
        const interval = setInterval(() => {
            remaining--;
            if(display) display.innerText = remaining;
            if (remaining <= 0) {
                clearInterval(interval);
                document.getElementById('successScreen').style.display = 'none';
                document.getElementById('faucetForm').style.display = 'block';
                resetButton();
            }
        }, 1000);
    }

    function resetButton() {
        const btn = document.getElementById('claimBtn');
        if(btn) {
            btn.disabled = false;
            btn.innerText = "💰 Ödülü Topla - Collect Reward";
        }
    }
</script>
