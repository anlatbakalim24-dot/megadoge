    // 3. İşlem: Ana Ekran Geri Sayım Sayacı
    function startMainTimer(seconds) {
        const timerDisplay = document.getElementById('mainWaitTimer');
        const timeLeftSpan = document.getElementById('timeLeft');
        const btn = document.getElementById('claimBtn');

        timerDisplay.style.display = 'block';
        let remaining = seconds;

        claimInterval = setInterval(() => {
            remaining--;
            timeLeftSpan.innerText = remaining;
            
            if (remaining <= 0) {
                clearInterval(claimInterval);
                timerDisplay.style.display = 'none';
                btn.disabled = false;
                btn.innerText = "💰 Ödülü Topla";
            }
        }, 1000);

    }
