<!DOCTYPE html>
<html lang="tr">
<head>
    <script src='//libtl.com/sdk.js' data-zone='10793774' data-sdk='show_10793774'></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaDoge Faucet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-button-color: #0088cc; }
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .faucet-name { color: var(--tg-theme-button-color); font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; }
        #claimBtn { background-color: var(--tg-theme-button-color); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; }
        #claimBtn:disabled { background-color: #ccc; }
        .timer-box { margin-top: 15px; font-weight: bold; color: #e53935; display: none; }
        #successScreen { display: none; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="faucetForm">
        <div class="faucet-name">MegaDoge Faucet</div>
        <p>FaucetPay Email Adresiniz:</p>
        <input type="email" id="userEmail" placeholder="email@example.com">
        <button id="claimBtn" onclick="initiateClaim()">💰 Ödülü Topla</button>
        <div id="mainWaitTimer" class="timer-box">Geri Sayım: <span id="timeLeft">60</span>s</div>
    </div>

    <div id="successScreen">
        <h2 style="color: #4CAF50;">✅ BAŞARILI!</h2>
        <p>Ödemeniz gönderildi. 60 saniye sonra tekrar deneyin.</p>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const savedEmail = localStorage.getItem('faucetEmail');
    if(savedEmail) document.getElementById('userEmail').value = savedEmail;

    const WORKER_URL = "https://young-cell-f414.anlatbakalim24.workers.dev/";

    function initiateClaim() {
        const email = document.getElementById('userEmail').value;
        if (!email.includes("@")) {
            alert("Lütfen geçerli bir email girin.");
            return;
        }
        localStorage.setItem('faucetEmail', email);

        // REKLAMI ÇAĞIR
        if (typeof show_10793774 === 'function') {
            show_10793774('pop').then(() => {
                completeClaim();
            }).catch(() => {
                completeClaim(); // Reklam açılmazsa bile ödemeye geç
            });
        } else {
            completeClaim(); // SDK yüklenmediyse direkt geç
        }
    }

    async function completeClaim() {
        document.getElementById('faucetForm').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
        document.getElementById('claimBtn').disabled = true;

        const email = localStorage.getItem('faucetEmail');

        try {
            await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
        } catch (e) {
            console.log("Hata oluştu.");
        }

        startMainTimer(60);
    }

    function startMainTimer(seconds) {
        const timeLeftSpan = document.getElementById('timeLeft');
        const timerDisplay = document.getElementById('mainWaitTimer');
        let remaining = seconds;

        const claimInterval = setInterval(() => {
            remaining--;
            timeLeftSpan.innerText = remaining;
            
            if (remaining <= 0) {
                clearInterval(claimInterval);
                document.getElementById('successScreen').style.display = 'none';
                document.getElementById('faucetForm').style.display = 'block';
                timerDisplay.style.display = 'none';
                document.getElementById('claimBtn').disabled = false;
                document.getElementById('claimBtn').innerText = "💰 Ödülü Topla";
            } else {
                timerDisplay.style.display = 'block';
            }
        }, 1000);
    }
</script>

<p><b>Benzer Konular</b></p><ul id="relatedLinks"></ul>
</body>
</html>
