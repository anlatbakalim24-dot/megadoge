<!DOCTYPE html>
<html lang="tr">
<head>
    <script src='//libtl.com/sdk.js' data-zone='10793774' data-sdk='show_10793774'></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MegaDoge Faucet</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-button-color: #0088cc; }
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .faucet-name { color: var(--tg-theme-button-color); font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; }
        #claimBtn { background-color: var(--tg-theme-button-color); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        #claimBtn:disabled { background-color: #ccc; }
        .timer-box { margin-top: 15px; font-weight: bold; color: #e53935; display: none; font-size: 18px; }
        #successScreen { display: none; padding: 20px; }
        .description { font-size: 14px; color: #666; line-height: 1.4; }
        #userGreeting { color: #0088cc; font-size: 18px; margin-bottom: 15px; height: 22px; }
    </style>
</head>
<body>

<div class="container">
    <div id="faucetForm">
        <div class="faucet-name">MegaDoge Faucet</div>
        
        <div id="userGreeting"></div>

        <p class="description">
            Welcome! Earn free DOGE <b>every minute</b>. Payments are instant to <b>FaucetPay</b>.
        </p>
        
        <button onclick="goToFaucets()" style="margin-bottom: 15px; background-color: #fbc02d; border:none; padding:10px; border-radius:10px; cursor:pointer; font-weight:bold;">
            🚀 (Faucets List)
        </button>

        <p style="font-size:13px; font-weight:bold;">FaucetPay Email Address:</p>
        <input type="email" id="userEmail" placeholder="email@example.com">
        <button id="claimBtn" onclick="initiateClaim()">💰 Ödülü Topla - Collect Reward</button>
    </div>

    <div id="successScreen">
        <h2 style="color: #4CAF50;">✅ BAŞARILI - Success!</h2>
        <p>Ödemeniz gönderildi. 60 saniye sonra tekrar deneyin.</p>
        <div id="mainWaitTimer" class="timer-box">Geri Sayım: <span id="timeLeft">60</span>s</div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const WORKER_URL = "https://young-cell-f414.anlatbakalim24.workers.dev/";
    
    // KULLANICI ADI VE ID AYARLARI
    const user = tg.initDataUnsafe?.user;
    const userId = user?.id ? String(user.id) : "guest_" + Math.floor(Math.random() * 1000);
    const firstName = user?.first_name || "Doge User";

    // Sayfa açıldığında ismi yazdır
    document.getElementById('userGreeting').innerText = "Merhaba, " + firstName + "! 👋";

    function goToFaucets() {
        window.open("https://omg10.com/4/10795763", '_blank');
        setTimeout(() => { window.location.href = "faucets.html"; }, 300);
    }

    function checkAdStatus() {
        return typeof show_10793774 === 'function';
    }

    function initiateClaim() {
        const email = document.getElementById('userEmail').value;
        if (!email.includes("@")) {
            alert("Geçerli bir email girin.");
            return;
        }
        localStorage.setItem('faucetEmail', email);

        const claimBtn = document.getElementById('claimBtn');
        claimBtn.disabled = true;
        claimBtn.innerText = "🔄 Reklam Yükleniyor...";

        if (checkAdStatus()) {
            // CPM için userId (ymid) Monetag'a gönderiliyor
            show_10793774({ ymid: userId })
                .then(() => {
                    completeClaim();
                })
                .catch((err) => {
                    alert("Ödül için reklamı bitirmelisiniz.");
                    resetButton();
                });
        } else {
            setTimeout(() => {
                if (checkAdStatus()) { initiateClaim(); } 
                else { alert("Reklam hazır değil, sayfayı yenileyin."); resetButton(); }
            }, 3000);
        }
    }

    function resetButton() {
        const btn = document.getElementById('claimBtn');
        btn.disabled = false;
        btn.innerText = "💰 Ödülü Topla - Collect Reward";
    }

    async function completeClaim() {
        document.getElementById('faucetForm').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
        document.getElementById('mainWaitTimer').style.display = 'block';

        const email = localStorage.getItem('faucetEmail');

        try {
            await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
        } catch (e) { console.log("Worker sinyali gönderildi."); }
        
        startMainTimer(60);
    }

    function startMainTimer(seconds) {
        let remaining = seconds;
        const timeLeftDisplay = document.getElementById('timeLeft');
        
        const interval = setInterval(() => {
            remaining--;
            if(timeLeftDisplay) timeLeftDisplay.innerText = remaining;
            
            if (remaining <= 0) {
                clearInterval(interval);
                document.getElementById('successScreen').style.display = 'none';
                document.getElementById('faucetForm').style.display = 'block';
                resetButton();
            }
        }, 1000);
    }
</script>
</body>
</html>
